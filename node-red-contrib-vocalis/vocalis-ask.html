<script type="text/javascript">
    RED.nodes.registerType('vocalis-ask',{
        category: 'Vocalis Voice',
        color: '#a78bfa',
        defaults: {
            name: { value: "" },
            server: { value: "", type: "vocalis-config", required: true },
            promptText: { value: "" },
            bargeIn: { value: true },
            requireSpeakerId: { value: false },
            outputFormat: { value: "both" },
            vadTimeout: { value: 10.0, validate: RED.validators.number() },
            priority: { value: 0, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 2,
        outputLabels: ["Success", "Timeout / Auth Failed"],
        icon: "font-awesome/fa-microphone",
        label: function() {
            return this.name || this.promptText || "Vocalis Ask";
        },
        paletteLabel: "vocalis ask"
    });
</script>

<script type="text/html" data-template-name="vocalis-ask">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-promptText"><i class="fa fa-comment"></i> Prompt Text</label>
        <input type="text" id="node-input-promptText" placeholder="Text to say before listening">
    </div>
    <div class="form-row">
        <label for="node-input-bargeIn"><i class="fa fa-hand-paper-o"></i> Barge-In</label>
        <input type="checkbox" id="node-input-bargeIn" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Allow user to interrupt speech playback</span>
    </div>
    <div class="form-row">
        <label for="node-input-requireSpeakerId"><i class="fa fa-user-secret"></i> Verify Speaker</label>
        <input type="checkbox" id="node-input-requireSpeakerId" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Require biometric speaker identification</span>
    </div>
    <div class="form-row">
        <label for="node-input-outputFormat"><i class="fa fa-file-audio-o"></i> Output Format</label>
        <select id="node-input-outputFormat">
            <option value="text">Text (Transcription Only)</option>
            <option value="audio">Audio (WAV Base64 Only)</option>
            <option value="both">Both (Text + Audio)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-vadTimeout"><i class="fa fa-clock-o"></i> VAD Timeout</label>
        <input type="number" id="node-input-vadTimeout" placeholder="10.0" step="0.5" min="1">
    </div>
    <div class="form-row">
        <label for="node-input-priority"><i class="fa fa-sort-amount-desc"></i> Priority</label>
        <input type="number" id="node-input-priority" placeholder="0" min="0" step="1">
    </div>
</script>
